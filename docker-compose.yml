# Usage local uniquement (tests manuels) — n'est pas utilisé pour le
# déploiement, qui se fait directement à partir du Dockerfile.
#
# Démarrer :    docker compose up --build
# App :         http://127.0.0.1:8080
# phpMyAdmin :  http://127.0.0.1:8081  (user: laravel / password: secret)

services:
  app:
    build: .
    ports:
      - '8080:8080'
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    entrypoint: []
    command: php artisan queue:work --tries=3 --sleep=3
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    entrypoint: []
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy

